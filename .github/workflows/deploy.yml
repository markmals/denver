name: 🛠️ Build & Deploy to Cloudflare Workers

on:
    push:
        branches:
            - main

permissions:
    contents: read
    deployments: write

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        environment:
            name: production
            url: https://denver.malstrom.me

        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            - name: ⚡️ Setup Vite+
              uses: voidzero-dev/setup-vp@v1
              with:
                  node-version: "24"
                  cache: true

            - name: ⚒️ Build website
              run: vp build

            - name: ☁️ Deploy Worker
              uses: cloudflare/wrangler-action@v3.14.1
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  command: deploy --config dist/ssr/wrangler.json
                  packageManager: npm
