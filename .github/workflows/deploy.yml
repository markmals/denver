name: 🛠️ Build & Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://denver.malstrom.me

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: ⚒️ Build website
        run: vp build

      - name: 📦 Add assets config to wrangler.json
        run: |
          jq '. + {assets: {directory: "../client"}}' build/server/wrangler.json > build/server/wrangler.tmp.json
          mv build/server/wrangler.tmp.json build/server/wrangler.json

      - name: ☁️ Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --config build/server/wrangler.json
          packageManager: npm
